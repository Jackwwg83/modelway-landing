    </g>
    <g stroke="#14b8a6" stroke-linecap="round" stroke-width="2.2">
      <line x1="50" y1="50" x2="50" y2="20"/>
      <line x1="50" y1="50" x2="76" y2="35"/>
      <line x1="50" y1="50" x2="76" y2="65"/>
      <line x1="50" y1="50" x2="50" y2="80"/>
      <line x1="50" y1="50" x2="24" y2="65"/>
      <line x1="50" y1="50" x2="24" y2="35"/>
    </g>
    <g fill="#14b8a6">
      <circle cx="50" cy="50" r="7.5"/>
      <circle cx="50" cy="20" r="3.5"/>
      <circle cx="76" cy="35" r="3.5"/>
      <circle cx="76" cy="65" r="3.5"/>
      <circle cx="50" cy="80" r="3.5"/>
      <circle cx="24" cy="65" r="3.5"/>
      <circle cx="24" cy="35" r="3.5"/>
