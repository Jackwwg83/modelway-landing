  <text x="380" y="310" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="88" letter-spacing="-2">ModelWay</text>
  <text x="380" y="380" fill="#14b8a6" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="500" font-size="32" letter-spacing="-0.5">Unified AI API gateway</text>
  <text x="380" y="425" fill="#8a908c" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="400" font-size="26">Claude · GPT · Gemini — one endpoint, faster than upstream</text>
  <!-- Bottom label -->
  <text x="80" y="580" fill="#4a5a57" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20" letter-spacing="1">modelway.dev</text>
  <text x="1015" y="580" fill="#4a5a57" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20" letter-spacing="1">AI · API · GATEWAY</text>
